name: shellcheck

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -x --source-path=SCRIPTDIR setup.sh doctor.sh scripts/*.sh claude-config/hooks/*.sh
