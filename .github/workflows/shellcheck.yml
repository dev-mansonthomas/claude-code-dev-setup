name: shellcheck

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -x --source-path=SCRIPTDIR 01-setup.sh 02-doctor.sh 03-vm-up.sh 04-vm-auth.sh 05-new-project.sh sync-project.sh grafana-up.sh grafana-down.sh ccvm scripts/*.sh claude-config/hooks/*.sh project-template/.githooks/pre-commit
